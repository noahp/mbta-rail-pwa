<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7B388C" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#5a1b6e" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MBTA Rail" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>MBTA Commuter Rail</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="header-left">
          <svg class="header-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="13" rx="3" stroke="currentColor" stroke-width="1.8"/>
            <path d="M3 12h18" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="7.5" cy="19.5" r="1.5" fill="currentColor"/>
            <circle cx="16.5" cy="19.5" r="1.5" fill="currentColor"/>
            <path d="M7.5 18V17" stroke="currentColor" stroke-width="1.5"/>
            <path d="M16.5 18V17" stroke="currentColor" stroke-width="1.5"/>
            <rect x="6" y="6.5" width="4" height="3" rx="0.5" fill="currentColor"/>
            <rect x="14" y="6.5" width="4" height="3" rx="0.5" fill="currentColor"/>
          </svg>
          <h1>MBTA Commuter Rail</h1>
        </div>
        <a class="icon-btn schedules-btn" href="https://www.mbta.com/schedules/commuter-rail" target="_blank" rel="noopener" aria-label="MBTA Schedules">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <line x1="8" y1="14" x2="8" y2="14" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="12" y1="14" x2="12" y2="14" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="16" y1="14" x2="16" y2="14" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="8" y1="18" x2="8" y2="18" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="12" y1="18" x2="12" y2="18" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          Schedules
        </a>
        <button class="settings-btn icon-btn" data-action="open-settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </header>

      <div id="settings-panel"></div>
      <div id="status-bar"></div>
      <div id="direction-filter"></div>
      <main id="routes-container" class="routes-list">
        <div class="loading-routes">
          <div class="spinner"></div>
          <p>Loading routes…</p>
        </div>
      </main>
      <div id="alerts-container" class="alerts-list" hidden></div>
      <nav id="tab-bar" class="tab-bar"></nav>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
